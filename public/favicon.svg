<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- Olive green background with rounded corners -->
  <rect width="64" height="64" rx="13" fill="#4a5c2a"/>

  <!-- Subtle inner highlight (top-left glow for depth) -->
  <rect width="64" height="64" rx="13" fill="url(#shine)" opacity="0.18"/>

  <defs>
    <radialGradient id="shine" cx="30%" cy="20%" r="60%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- White outer arch — walls + arched top -->
  <path fill="white" d="M 8 57 L 8 27 A 24 24 0 0 1 56 27 L 56 57 Z"/>

  <!-- Olive inner cutout — creates the arch opening and right-side notch -->
  <path fill="#4a5c2a" d="M 17 57 L 17 30 A 15 15 0 0 1 47 30 L 47 41 L 33 41 L 33 57 Z"/>

</svg>
